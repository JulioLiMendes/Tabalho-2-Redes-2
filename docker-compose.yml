version: "3.9"

networks:
  rede_teste:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  dns:
    build: .
    container_name: redes2_dns
    hostname: dns
    networks:
      rede_teste:
        ipv4_address: 172.20.0.30
    cap_add:
      - NET_ADMIN
    volumes:
      - ./logs:/app/logs
      - ./dns:/app/dns
    command: python3 /app/dns/servidor_dns.py

  servidor:
    build: .
    container_name: redes2_servidor
    hostname: servidor
    networks:
      rede_teste:
        ipv4_address: 172.20.0.10
    cap_add:
      - NET_ADMIN
    depends_on:
      - dns
    volumes:
      - ./logs:/app/logs
      - ./servidor:/app/servidor
      - ./scripts:/app/scripts
      - ./www:/app/www
      - ./dns:/app/dns
    command: tail -f /dev/null

  cliente:
    build: .
    container_name: redes2_cliente
    hostname: cliente
    networks:
      rede_teste:
        ipv4_address: 172.20.0.20
    cap_add:
      - NET_ADMIN
    depends_on:
      - dns
      - servidor
    volumes:
      - ./logs:/app/logs
      - ./cliente:/app/cliente
      - ./scripts:/app/scripts
      - ./dns:/app/dns
      - ./www:/app/www
    command: tail -f /dev/null
